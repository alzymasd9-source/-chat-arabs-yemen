
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات عرب اليمن - غرف الصوت والأرباح</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://socket.io"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b141a; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d1b2a; }
        ::-webkit-scrollbar-thumb { background: #1b263b; border-radius: 3px; }
    </style>
</head>
<body class="text-gray-200 flex flex-col h-screen max-w-md mx-auto border-x border-gray-800 bg-[#0b141a] relative">

    <!-- 1. الشريط العلوي (يتضمن رصيد العملات الذهبية) -->
    <header class="bg-[#002233] p-3 flex justify-between items-center border-b border-gray-800 shadow-md">
        <div class="flex items-center gap-3">
            <button class="text-white text-xl"><i class="fas fa-bars"></i></button>
            <div class="flex items-center gap-1 bg-amber-950/40 border border-amber-500/50 px-2 py-1 rounded-full text-xs text-amber-400 font-bold animate-pulse">
                <i class="fas fa-coins text-amber-500"></i>
                <span id="my-coins-balance">0</span>
            </div>
            <button class="text-white text-lg" onclick="toggleGiftModal()" title="إرسال هدية">
                <i class="fas fa-gift text-pink-500 hover:scale-110 transition-transform"></i>
            </button>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-xs text-gray-400" id="current-user-display">جاري الاتصال...</span>
            <img src="https://unsplash.com" class="w-9 h-9 rounded-full border-2 border-amber-500 object-cover">
        </div>
    </header>

    <!-- مؤشر الغرفة الصوتية النشطة -->
    <div id="audio-status" class="bg-emerald-950/40 border-b border-emerald-500/20 px-3 py-1.5 text-[11px] text-emerald-400 flex justify-between items-center hidden">
        <span><i class="fas fa-circle text-emerald-500 animate-ping ml-1"></i> متصل الآن بالبث الصوتي الحي الغرفة...</span>
        <span class="font-bold bg-emerald-900/50 px-2 py-0.5 rounded text-[10px]">المايك شغال</span>
    </div>

    <!-- 2. صندوق هدايا وعملات -->
    <div id="gift-modal" class="hidden absolute top-16 left-4 right-4 bg-[#112233] border border-pink-500/40 rounded-xl p-4 shadow-2xl z-50">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-sm font-bold text-pink-400"><i class="fas fa-paper-plane"></i> تحويل عملات وهدايا</h3>
            <button onclick="toggleGiftModal()" class="text-gray-400 text-xs">إغلاق <i class="fas fa-times"></i></button>
        </div>
        <div class="space-y-3">
            <input type="text" id="gift-receiver" placeholder="اسم المستخدم المستلم" class="w-full bg-[#1e2c34] text-white text-xs rounded p-2 outline-none border border-gray-700">
            <input type="number" id="gift-amount" placeholder="عدد العملات" class="w-full bg-[#1e2c34] text-white text-xs rounded p-2 outline-none border border-gray-700">
            <button onclick="sendGift()" class="w-full bg-gradient-to-r from-pink-600 to-purple-600 text-white text-xs font-bold py-2 rounded shadow-lg">إرسال الهدية الآن</button>
        </div>
    </div>

    <!-- 3. منطقة رسائل الشات والاشعارات -->
    <main id="chat-messages" class="flex-1 overflow-y-auto p-3 space-y-4">
        <div class="flex items-start gap-2">
            <div class="w-10 h-10 rounded-full bg-emerald-600 flex items-center justify-center text-white font-bold">ص</div>
            <div class="flex-1">
                <div class="flex items-center gap-2 text-xs text-gray-400">
                    <span class="text-emerald-400 font-bold">نظام الصوت</span>
                    <span>الآن</span>
                </div>
                <p class="text-sm mt-1 bg-[#112233] p-2 rounded-lg inline-block text-right">مرحباً بك! لتشغيل الشات الصوتي والتحدث مع المتواجدين، اضغط على أيقونة **المايكروفون الخضراء** 🎤 بالأسفل وتحدث مباشرة.</p>
            </div>
        </div>
    </main>

    <!-- 4. شريط أدوات التفاعل العلوي لصندوق الكتابة -->
    <div class="bg-[#0f1d2a] px-4 py-2 flex justify-between items-center border-t border-gray-800">
        <div class="flex gap-4 text-xl text-blue-400">
            <button><i class="fas fa-cloud-upload-alt text-cyan-400"></i></button>
            <button><i class="fas fa-file-signature text-blue-500"></i></button>
            <button><i class="fas fa-paint-brush text-pink-400"></i></button>
            <button><i class="fab fa-youtube text-red-500"></i></button>
        </div>
        <div class="flex items-center gap-1 text-xs text-gray-400 bg-[#172a3a] px-2 py-1 rounded">
            <span>رتبتك:</span>
            <span class="text-red-400 font-bold" id="user-role-display">عضو</span>
        </div>
    </div>

    <!-- 5. صندوق إدخال الرسائل والميكروفون الحي -->
    <footer class="bg-[#071117] p-2 flex items-center gap-2 border-t border-gray-800">
        <button class="text-gray-400 hover:text-white px-1 text-xl"><i class="fas fa-plus"></i></button>
        <button class="text-gray-400 hover:text-white px-1 text-xl"><i class="far fa-smile"></i></button>
        <input type="text" id="message-input" placeholder="اكتب رسالة هنا..." class="flex-1 bg-[#1e2c34] text-white placeholder-gray-500 text-sm rounded-full py-2 px-4 outline-none text-right">
        
        <!-- زر الميكروفون للدردشة الصوتية الفورية -->
        <button id="mic-btn" onclick="toggleVoiceChat()" class="text-gray-400 hover:text-emerald-400 px-1 text-xl transition-colors" title="دخول الشات الصوتي الحى">
            <i class="fas fa-microphone" id="mic-icon"></i>
        </button>
        
        <button id="send-btn" class="bg-cyan-600 text-white rounded-full w-9 h-9 flex items-center justify-center hover:bg-cyan-500"><i class="fas fa-paper-plane transform rotate-180"></i></button>
    </footer>

    <!-- حاوية مخفية لتشغيل تدفقات الصوت القادمة من المستخدمين الآخرين -->
    <div id="remote-audios" class="hidden"></div>

    <script>
        const socket = io("https://chat-arabs-yemen.onrender.com");

        const seedNames = ["المسافر", "صنعاني أنيق", "شبل اليمن", "ملكة سبأ"];
        const myUsername = seedNames[Math.floor(Math.random() * seedNames.length)];
        
        let localStream = null;
        let peerConnections = {};
        let isVoiceConnected = false;

        // إعداد خوادم التوصيل المجانية لنقل الصوت من شركة جوجل (STUN Servers)
        const rtcConfig = { iceServers: [{ urls: 'stun:://google.com' }] };

        document.getElementById('current-user-display').innerText = myUsername;
        socket.emit('user_logged_in', myUsername);

        socket.on('update_my_balance', (data) => {
            document.getElementById('my-coins-balance').innerText = data.coins;
            document.getElementById('user-role-display').innerText = data.role;
        });

        // ---------------- [ منطق الشات الصوتي الفوري WebRTC ] ----------------

        async function toggleVoiceChat() {
            const micBtn = document.getElementById('mic-btn');
            const micIcon = document.getElementById('mic-icon');
            const statusDiv = document.getElementById('audio-status');

            if (!isVoiceConnected) {
                try {
                    // طلب إذن المايك والتقاط الصوت من جهاز المستخدم
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    isVoiceConnected = true;
                    
                    micBtn.classList.remove('text-gray-400');
                    micBtn.classList.add('text-emerald-400', 'animate-pulse');
                    statusDiv.classList.remove('hidden');

                    // طلب إشارات الغرفة لربط الصوت مع المتواجدين تلقائياً
                    socket.emit('user_logged_in', myUsername);
                    console.log("تم تفعيل المايك بنجاح وبث الصوت جاري...");
                } catch (err) {
                    alert("يرجى إعطاء صلاحية الوصول للميكروفون لتتمكن من التحدث!");
                    console.error(err);
                }
            } else {
                // إغلاق الميكروفون
                if(localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                isVoiceConnected = false;
                micBtn.classList.remove('text-emerald-400', 'animate-pulse');
                micBtn.classList.add('text-gray-400');
                statusDiv.classList.add('hidden');
                console.log("تم فصل الصوت وكتم المايك.");
            }
        }

        // استقبال مكالمات الصوت وإنشاء قنوات استقبال
        socket.on('all_audio_users', (users) => {
            if (!isVoiceConnected) return;
            Object.keys(users).forEach(socketId => {
                if (socketId !== socket.id) {
                    initiateAudioCall(socketId);
                }
            });
        });

        async function initiateAudioCall(targetSocketId) {
            const pc = new RTCPeerConnection(rtcConfig);
            peerConnections[targetSocketId] = pc;

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice_candidate', { target: targetSocketId, candidate: event.candidate });
                }
            };

            pc.ontrack = (event) => {
                handleRemoteAudio(targetSocketId, event.streams[0]);
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
